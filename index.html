<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Berbers Review — Onderzoek</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0a0a0f}
body{font-family:Georgia,serif;color:#fff;overscroll-behavior:none}
#app{min-height:100vh;min-height:-webkit-fill-available}
button{font-family:Georgia,serif;cursor:pointer}
button:active{opacity:0.75}
input{font-family:Georgia,serif}

/* screens */
.screen{min-height:100vh;background:#0a0a0f;color:#fff}

/* home */
.home-header{padding:52px 20px 20px}
.home-title-sub{font-size:11px;letter-spacing:3px;color:#444;text-transform:uppercase;margin-bottom:6px}
.home-title{font-size:30px;font-weight:700;line-height:1.1;color:#fff}
.home-meta{margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.home-meta-text{font-size:13px;color:#555}
.storage-badge{font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid}
.storage-ok{background:#4ade8012;color:#4ade80;border-color:#4ade8025}
.storage-fail{background:#ef444412;color:#ef4444;border-color:#ef444425}
.storage-loading{background:#ffffff08;color:#666;border-color:#ffffff15}
.niveau-list{padding:0 16px 50px;display:flex;flex-direction:column;gap:10px}
.niveau-card{background:#111118;border-radius:16px;overflow:hidden;position:relative;border:1px solid}
.niveau-fill{position:absolute;top:0;left:0;height:100%;background:#6366f10a;transition:width .4s}
.niveau-inner{position:relative;padding:16px 18px}
.niveau-top{display:flex;justify-content:space-between;align-items:flex-start}
.niveau-name{font-size:17px;font-weight:700;color:#fff;margin-bottom:2px}
.niveau-sub{font-size:12px;color:#555}
.niveau-count{font-size:13px;font-weight:600;text-align:right}
.niveau-done{font-size:11px;color:#555;margin-top:1px;text-align:right}
.niveau-bar-wrap{background:#ffffff08;border-radius:4px;height:3px;overflow:hidden;margin:10px 0}
.niveau-bar{height:100%;border-radius:4px;transition:width .4s}
.niveau-btns{display:flex;gap:8px}
.btn-primary{flex:2;border-radius:10px;padding:10px;font-size:14px;font-weight:600;border:1px solid}
.btn-secondary{flex:1;background:#0a0a0f;border:1px solid #ffffff18;border-radius:10px;padding:10px;font-size:14px;color:#aaa}

/* review */
.review-topbar{padding:16px 16px 10px;background:#0a0a0f;position:sticky;top:0;z-index:10}
.review-topbar-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.review-back{background:none;border:none;color:#555;font-size:13px;padding:0}
.review-meta{display:flex;gap:8px;align-items:center}
.review-flash{font-size:11px;color:#4ade80}
.review-open-badge{font-size:11px;background:#ffffff0d;border-radius:20px;padding:2px 8px;color:#777}
.review-counter{font-size:12px;color:#555}
.progress-bar-wrap{background:#ffffff0d;border-radius:4px;height:3px;overflow:hidden}
.progress-bar{height:100%;border-radius:4px;transition:width .25s}
.review-body{flex:1;padding:8px 16px 0;overflow-y:auto}
.word-card{background:#111118;border-radius:20px;padding:22px 20px;margin-bottom:14px;border:1px solid}
.thema-tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:16px}
.word-label{font-size:11px;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.word-nl{font-size:36px;font-weight:700;color:#fff;line-height:1.1;margin-bottom:18px}
.word-primary{font-size:26px;font-weight:600}
.alts-section{margin-bottom:14px}
.alts-label{font-size:10px;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding-left:2px}
.alts-grid{display:flex;flex-wrap:wrap;gap:8px}
.alt-btn{background:#111118;border:1px solid #ffffff15;border-radius:12px;padding:10px 14px;font-size:15px;color:#ccc}
.eigen-section{margin-bottom:14px}
.eigen-row{display:flex;gap:8px}
.eigen-input{flex:1;background:#111118;border-radius:12px;padding:12px 14px;font-size:16px;color:#fff;outline:none;border:1px solid #f59e0b40}
.eigen-confirm{background:#f59e0b;border:none;border-radius:12px;padding:12px 16px;font-size:15px;font-weight:700;color:#000}
.review-actions{padding:12px 16px 40px;background:#0a0a0f;border-top:1px solid #ffffff08}
.btn-primair{width:100%;border-radius:14px;padding:16px;font-size:16px;font-weight:700;border:1px solid;margin-bottom:10px}
.btn-row{display:flex;gap:8px}
.btn-eigen,.btn-later{flex:1;background:#111118;border:1px solid #ffffff15;border-radius:14px;padding:13px;font-size:14px;color:#888}
.btn-cancel{width:100%;background:#111118;border:1px solid #ffffff15;border-radius:14px;padding:13px;font-size:14px;color:#888}

/* done screen */
.done-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;gap:14px;background:#0a0a0f}
.done-icon{font-size:48px}
.done-title{font-size:24px;font-weight:700;text-align:center;color:#fff}
.done-sub{font-size:14px;color:#555;text-align:center}
.btn-done-back{margin-top:10px;border-radius:14px;padding:14px 28px;font-size:15px;font-weight:600;border:1px solid}

/* results */
.results-header{padding:44px 16px 14px;position:sticky;top:0;background:#0a0a0f;z-index:10;border-bottom:1px solid #ffffff0a}
.results-toprow{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.results-title-sub{font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.results-title{font-size:22px;font-weight:700;color:#fff}
.btn-csv{border-radius:10px;padding:9px 16px;font-size:13px;font-weight:600;border:1px solid}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;-ms-overflow-style:none;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;border-radius:20px;padding:6px 12px;font-size:12px;border:1px solid;white-space:nowrap}
.results-search-row{display:flex;gap:6px;margin:12px 0 10px;position:relative}
.results-search{flex:1;background:#111118;border:1px solid #ffffff15;color:#fff;border-radius:10px;padding:10px 14px;font-size:14px;outline:none;font-family:Georgia,serif}
.results-search:focus{border-color:#6366f180}
.results-search-clear{background:#111118;border:1px solid #ffffff15;color:#888;border-radius:10px;padding:0 14px;font-size:14px;cursor:pointer}
.results-search-meta{font-size:11px;color:#666;padding:6px 2px 0}
.results-list{padding:12px 16px 40px}
.result-item{width:100%;background:#111118;border-radius:14px;padding:14px 16px;text-align:left;margin-bottom:8px;border:1px solid #ffffff08;display:flex;justify-content:space-between;align-items:flex-start;border-left:3px solid}
.result-nl{font-size:16px;font-weight:600;color:#fff}
.result-berbers{font-size:14px;margin-top:3px}
.result-orig{font-size:11px;color:#444;margin-top:2px}
.result-status{font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.result-edit-icon{font-size:11px;color:#333}
.empty-state{color:#555;font-size:14px;text-align:center;margin-top:40px}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;flex-direction:column;justify-content:flex-end}
.modal-sheet{background:#111118;border-radius:20px 20px 0 0;padding:20px 16px 50px;max-height:82vh;overflow-y:auto}
.modal-handle{width:32px;height:4px;background:#ffffff18;border-radius:2px;margin:0 auto 18px}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.modal-thema{display:inline-block;font-size:11px;padding:2px 10px;border-radius:20px;margin-bottom:8px}
.modal-word{font-size:26px;font-weight:700;color:#fff}
.modal-primair-orig{font-size:13px;color:#555;margin-top:2px}
.modal-close{background:none;border:none;color:#555;font-size:20px;padding:4px 8px}
.modal-section-label{font-size:10px;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.modal-option{width:100%;border-radius:12px;padding:12px 14px;font-size:15px;text-align:left;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border:1px solid}
.modal-option-label{font-size:11px;opacity:0.5}
.modal-alts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.modal-alt{border-radius:12px;padding:10px 14px;font-size:15px;border:1px solid}
.modal-eigen-row{display:flex;gap:8px;margin-bottom:8px}
.modal-back-btn{width:100%;margin-top:4px;background:none;border:1px dashed #ffffff15;border-radius:12px;padding:12px;font-size:13px;color:#555}

@media (min-width:600px){
  #app{max-width:480px;margin:0 auto}
  body{background:#000}
}

/* onboarding + sync */
.onboard{padding:60px 22px 40px;display:flex;flex-direction:column;gap:16px;min-height:100vh}
.onboard-title{font-size:26px;font-weight:700;line-height:1.15}
.onboard-sub{font-size:14px;color:#777;line-height:1.5}
.onboard-label{font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;margin-top:8px}
.onboard-input{width:100%;background:#111118;border:1px solid #ffffff18;border-radius:12px;padding:14px 16px;font-size:16px;color:#fff;outline:none;font-family:Georgia,serif}
.onboard-input:focus{border-color:#6366f180}
.onboard-btn{background:#6366f1;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;color:#fff;margin-top:10px;font-family:Georgia,serif}
.onboard-btn:disabled{opacity:0.4}
.onboard-foot{font-size:11px;color:#444;text-align:center;margin-top:auto;padding-top:20px}
.sync-badge{font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid}
.sync-ok{background:#4ade8012;color:#4ade80;border-color:#4ade8025}
.sync-pending{background:#f59e0b12;color:#f59e0b;border-color:#f59e0b25}
.sync-fail{background:#ef444412;color:#ef4444;border-color:#ef444425}
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:#111118;border:1px solid #4ade8055;color:#4ade80;padding:10px 18px;border-radius:10px;font-size:13px;z-index:300;box-shadow:0 8px 28px #000a}
.toast.err{border-color:#ef444455;color:#ef4444}
.identity-bar{font-size:11px;color:#666;padding:4px 0 0}
.identity-bar button{background:none;border:none;color:#6366f1;font-size:11px;padding:0;margin-left:6px;text-decoration:underline;cursor:pointer}

/* sync-strook (klikbaar, groter dan badge) */
.sync-badge{font-size:11px;padding:3px 10px;border-radius:10px;border:1px solid;cursor:pointer}
.sync-badge:active{opacity:.7}

/* config-banner (bovenaan wanneer Supabase niet bereikbaar is) */
.config-banner{position:sticky;top:0;z-index:50;background:#ef444418;border-bottom:1px solid #ef444455;color:#fca5a5;font-size:13px;padding:10px 16px;text-align:center;line-height:1.4}
.config-banner b{color:#fff}
.config-banner a{color:#fff;text-decoration:underline}

/* diagnose-paneel rijtjes */
.diag-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#0d0d14;border-radius:10px;border:1px solid #ffffff12;font-size:13px;color:#aaa}
.diag-row b{color:#fff;font-size:13px}

/* welkom-terug scherm */
.welcome-back{padding:20px;background:#6366f110;border:1px solid #6366f135;border-radius:14px;margin-bottom:14px}
.welcome-back-title{font-size:14px;color:#a5b4fc;margin-bottom:4px}
.welcome-back-name{font-size:18px;font-weight:700;color:#fff;margin-bottom:10px}
.welcome-back-row{display:flex;gap:8px}

/* home: overall voortgang + klaar-knop */
.overall-progress{margin:14px 16px 0;padding:14px 16px;background:#111118;border:1px solid #ffffff0d;border-radius:14px}
.overall-progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.overall-progress-label{font-size:12px;color:#888}
.overall-progress-count{font-size:14px;font-weight:700;color:#fff}
.overall-bar-wrap{background:#ffffff0d;border-radius:4px;height:6px;overflow:hidden}
.overall-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,#6366f1,#8b5cf6);transition:width .4s}
.btn-finish{display:block;width:calc(100% - 32px);margin:16px 16px 0;padding:14px;border-radius:14px;background:linear-gradient(135deg,#4ade8020,#4ade8012);color:#4ade80;border:1px solid #4ade8050;font-size:15px;font-weight:700;font-family:Georgia,serif}

/* finish / dank-scherm */
.finish-wrap{padding:60px 24px 40px;display:flex;flex-direction:column;align-items:center;gap:16px;min-height:100vh;text-align:center}
.finish-icon{font-size:64px}
.finish-title{font-size:28px;font-weight:700;color:#fff}
.finish-sub{font-size:14px;color:#888;line-height:1.5;max-width:340px}
.finish-stats{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0;justify-content:center}
.finish-stat{background:#111118;border:1px solid #ffffff12;border-radius:12px;padding:12px 18px;min-width:90px}
.finish-stat-v{font-size:24px;font-weight:700}
.finish-stat-l{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.finish-btn{margin-top:20px;padding:14px 28px;border-radius:14px;background:#4ade8020;color:#4ade80;border:1px solid #4ade8050;font-size:15px;font-weight:700;font-family:Georgia,serif}
.finish-btn-secondary{padding:12px 24px;border-radius:12px;background:transparent;color:#888;border:1px solid #ffffff15;font-size:13px;font-family:Georgia,serif;margin-top:6px}
</style>
</head>

// ── Supabase client ─────────────────────────────────────────────────────────
const CFG = (window.APP_CONFIG || {});
let sb = null;

// De supabase-js bundle komt van een externe CDN. In sommige omgevingen (bv.
// een ingebouwde IDE-preview of bij een trage ad-blocker) is die op het moment
// dat dit script draait nog niet geladen. We wachten daarom tot maximaal 5s
// op window.supabase voor we definitief "geen verbinding" concluderen.
function tryInitSupabase() {
  if (sb) return sb;
  if (!CFG.SUPABASE_URL || !CFG.SUPABASE_ANON_KEY) return null;
  if (!window.supabase || !window.supabase.createClient) return null;
  try {
    sb = window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY);
    return sb;
  } catch(e) {
    console.warn('Supabase init faalde', e);
    return null;
  }
}

async function initSupabaseWithRetry() {
  const deadline = Date.now() + 5000;
  while (!tryInitSupabase() && Date.now() < deadline) {
    await new Promise(r => setTimeout(r, 100));
  }
  // Extra: als de config leeg is op Vercel (env vars niet gezet), zetten we een
  // laatste foutmelding zodat het diagnose-paneel dat ook toont.
  if (!sb) {
    if (!CFG.SUPABASE_URL || !CFG.SUPABASE_ANON_KEY) {
      recordError(new Error('config.js bevat geen SUPABASE_URL of SUPABASE_ANON_KEY'), 'initSupabase');
    } else if (!window.supabase) {
      recordError(new Error('supabase-js library niet geladen (CDN geblokkeerd?) — test in een echte browser via http://localhost:3000'), 'initSupabase');
    }
  }
  return sb;
}

// Synchronous poging direct, anders wachtt initSupabaseWithRetry() nog.
tryInitSupabase();

function newSessionId() {
  if (crypto && crypto.randomUUID) return crypto.randomUUID();
  // Handmatige UUID v4 via crypto.getRandomValues, altijd geldig voor een Postgres uuid-kolom.
  if (crypto && crypto.getRandomValues) {
    const b = new Uint8Array(16);
    crypto.getRandomValues(b);
    b[6] = (b[6] & 0x0f) | 0x40;
    b[8] = (b[8] & 0x3f) | 0x80;
    const hex = [...b].map(x => x.toString(16).padStart(2,'0')).join('');
    return `${hex.slice(0,8)}-${hex.slice(8,12)}-${hex.slice(12,16)}-${hex.slice(16,20)}-${hex.slice(20)}`;
  }
  // Laatste fallback: Math.random (zeer oude browsers). Niet cryptografisch, wel UUID-formaat.
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0, v = c==='x' ? r : (r&0x3|0x8);
    return v.toString(16);
  });
}

function isValidUuid(v) {
  return typeof v === 'string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(v);
}

function loadParticipant() {
  try {
    const raw = localStorage.getItem('brb_participant');
    if (raw) state.participant = JSON.parse(raw);
  } catch(e) {}
  // Oude sessies konden een 'sess_xxxx' id hebben dat geen geldig UUID is en dus
  // altijd zou falen bij de RPC. Die moeten we repareren naar een echt UUID.
  if (state.participant) {
    if (!isValidUuid(state.participant.id)) state.participant.id = newSessionId();
    if (!isValidUuid(state.participant.session_id)) state.participant.session_id = newSessionId();
    saveParticipant();
  }
}
function saveParticipant() {
  try { localStorage.setItem('brb_participant', JSON.stringify(state.participant)); } catch(e) {}
}
function resetParticipant() {
  state.participant = null;
  try { localStorage.removeItem('brb_participant'); } catch(e) {}
  state.screen = 'onboard';
  render();
}

// ── Sync queue ──────────────────────────────────────────────────────────────
// Laatste error zichtbaar in diagnose-paneel
state.lastError = null;
state.lastErrorAt = null;

function isUnknownParticipantError(err) {
  const m = (err && (err.message || err.hint || '')) + '';
  return /unknown participant/i.test(m) || err?.code === 'P0001' && /participant/i.test(m);
}

async function ensureParticipantRegistered() {
  if (!sb || !state.participant) return false;
  if (!isValidUuid(state.participant.id) || !isValidUuid(state.participant.session_id)) {
    // gebroken id → herstel en herstart een sessie
    state.participant.id = isValidUuid(state.participant.id) ? state.participant.id : newSessionId();
    state.participant.session_id = isValidUuid(state.participant.session_id) ? state.participant.session_id : newSessionId();
    saveParticipant();
  }
  const { error } = await sb.rpc('record_participant', {
    p_id: state.participant.id,
    p_session_id: state.participant.session_id,
    p_name: state.participant.name || 'Onbekend',
    p_email: state.participant.email || null,
    p_user_agent: navigator.userAgent,
  });
  if (error) throw error;
  return true;
}

async function callRecordResponse(payload) {
  const { error } = await sb.rpc('record_response', {
    p_participant_id: payload.participant_id,
    p_session_id: payload.session_id,
    p_niveau: payload.niveau,
    p_word_idx: payload.word_idx,
    p_nederlands: payload.nederlands,
    p_primair: payload.primair || null,
    p_thema: payload.thema || null,
    p_status: payload.status,
    p_waarde: payload.waarde || null,
    p_is_edit: payload.is_edit || false,
  });
  if (error) throw error;
}

// callRecordResponse met automatisch herstel: als Postgres zegt dat de participant
// niet bestaat, registreren we die opnieuw (idempotent) en proberen we de response
// één keer opnieuw. Dit lost de klassieke "niks wordt opgeslagen"-bug op die
// ontstaat als de eerste record_participant ooit mislukte.
async function callRecordResponseWithRecover(payload) {
  try {
    await callRecordResponse(payload);
  } catch(err) {
    if (isUnknownParticipantError(err)) {
      await ensureParticipantRegistered();
      await callRecordResponse(payload);
      return;
    }
    throw err;
  }
}

function recordError(err, phase) {
  state.lastError = { phase, message: err?.message || String(err), code: err?.code || null, hint: err?.hint || null, at: new Date().toISOString() };
  state.lastErrorAt = Date.now();
  console.error('[' + phase + ']', err);
}

async function pushResponse(payload) {
  if (!sb) {
    state.pendingQueue.push(payload);
    state.syncState = 'offline';
    updateSyncBadge();
    return;
  }
  state.syncState = 'pending';
  updateSyncBadge();
  try {
    await callRecordResponseWithRecover(payload);
    state.syncState = 'ok';
    state.lastError = null;
  } catch(err) {
    recordError(err, 'pushResponse');
    toast('Opslaan mislukt: ' + (err.message||'onbekende fout') + ' (tik statusbalk voor details)', 'err');
    state.pendingQueue.push(payload);
    state.syncState = 'fail';
  }
  updateSyncBadge();
}

async function flushQueue() {
  if (!sb || state.pendingQueue.length === 0) return;
  state.syncState = 'pending';
  updateSyncBadge();
  try { await ensureParticipantRegistered(); }
  catch(err) { recordError(err, 'flushQueue/ensureParticipant'); /* ga tóch door, misschien zijn andere rows nog te redden */ }
  const q = state.pendingQueue.slice();
  state.pendingQueue = [];
  const failed = [];
  for (const item of q) {
    try { await callRecordResponseWithRecover(item); }
    catch(err) { recordError(err, 'flushQueue'); failed.push(item); }
  }
  state.pendingQueue = failed.concat(state.pendingQueue);
  state.syncState = failed.length ? 'fail' : 'ok';
  persistQueue();
  updateSyncBadge();
}
function loadQueue() {
  try {
    const raw = localStorage.getItem('brb_queue');
    if (raw) state.pendingQueue = JSON.parse(raw) || [];
  } catch(e) {}
}
function persistQueue() {
  try { localStorage.setItem('brb_queue', JSON.stringify(state.pendingQueue)); } catch(e) {}
}
function updateSyncBadge() {
  const el = document.getElementById('syncBadge');
  if (!el) return;
  const n = state.pendingQueue.length;
  let cls = 'sync-badge', txt = '';
  if (!sb)                         { cls += ' sync-fail';    txt = '● geen verbinding'; }
  else if (state.syncState==='pending' || n>0) { cls += ' sync-pending'; txt = '● opslaan... ' + (n?('('+n+')'):''); }
  else if (state.syncState==='fail') { cls += ' sync-fail';  txt = '● opslaan mislukt — tik hier'; }
  else                              { cls += ' sync-ok';     txt = '● alles opgeslagen'; }
  el.className = cls;
  el.textContent = txt.trim();
  el.title = 'Klik voor diagnose-informatie';
  el.onclick = showDiagnose;
  // update banner (config-ontbreekt)
  const banner = document.getElementById('configBanner');
  if (banner) {
    const show = !sb || !CFG.SUPABASE_URL || !CFG.SUPABASE_ANON_KEY;
    banner.style.display = show ? 'block' : 'none';
  }
}

// ── CSV Export ─────────────────────────────────────────────────────────────
// Drie kolommen in vaste volgorde: Woord (NL) | Antwoord | Tag (het niveau,
// dat als categorie-tag fungeert). Open (nog geen keuze) wordt overgeslagen.
function doExport(niveau) {
  const words = DATA[niveau].w;
  const decs = state.allDecisions[niveau]?.decisions || {};
  const esc = s => '"' + String(s==null?'':s).replace(/"/g,'""') + '"';
  const rows = [['Woord','Antwoord','Tag'].map(esc).join(',')];
  words.forEach((w,i) => {
    const d = decs[i];
    if (!d || d.status==='open') return;
    rows.push([w.n, d.waarde || w.p, niveau].map(esc).join(','));
  });
  const blob = new Blob(['\uFEFF'+rows.join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'berbers_'+niveau.replace(/\s+/g,'_')+'.csv';
  a.click();
}

// Zoek het eerstvolgende woord zónder beslissing, vanaf startIdx vooruit. Als
// er verderop niks is (bv. de gebruiker zette een woord eerder terug in de lijst),
// wrappen we terug naar het begin. Geeft -1 als alles beslist is.
function findNextUndecided(niveau, startIdx) {
  const words = DATA[niveau].w;
  const decs = state.allDecisions[niveau]?.decisions || {};
  const n = words.length;
  for (let i = Math.max(0, startIdx); i < n; i++) if (!decs[i]) return i;
  for (let i = 0; i < Math.max(0, startIdx); i++) if (!decs[i]) return i;
  return -1;
}

// ── Render Review ──────────────────────────────────────────────────────────
function renderReview() {
  const niveau = state.activeNiveau;
  const words = DATA[niveau].w;
  const ns = state.allDecisions[niveau];
  const decisions = ns?.decisions||{};
  let idx = ns?.idx||0;
  const c = NC[NIVEAUS.indexOf(niveau)];

  // Als het huidige of voorbije idx al beslist is (kan na "Terug in de lijst",
  // na "Later" of wanneer idx voorbij het eind staat), zoek het eerstvolgende
  // onbesliste woord. Zo wordt een teruggezet woord automatisch weer getoond.
  if (idx >= words.length || decisions[idx]) {
    const next = findNextUndecided(niveau, idx >= words.length ? 0 : idx);
    if (next === -1) {
      const open = Object.values(decisions).filter(d=>d?.status==='open').length;
      document.getElementById('app').innerHTML = `
      <div class="done-screen">
        <div class="done-icon">✓</div>
        <div class="done-title">${h(niveau)} klaar</div>
        <div class="done-sub">${open>0?open+' woorden staan nog open':'Alle woorden beoordeeld'}</div>
        <button class="btn-done-back" style="background:${c}20;color:${c};border-color:${c}50" onclick="goHome()">← Terug naar niveaus</button>
      </div>`;
      return;
    }
    idx = next;
    state.allDecisions[niveau].idx = idx;
    lsSave(niveau);
  }

  const word = words[idx];
  const tc = TC[word.t]||'#64748b';
  const openCount = Object.values(decisions).filter(d=>d?.status==='open').length;
  const decidedCount = Object.keys(decisions).length;
  // Voortgang = aantal woorden met een beslissing / totaal. Bij "Terug in lijst"
  // daalt deze correct (ipv de lineaire idx-teller die voorheen gebruikt werd).
  const pct = (decidedCount/words.length*100).toFixed(1);

  const altsHtml = word.a.length>0 ? `
    <div class="alts-section">
      <div class="alts-label">Alternatieven</div>
      <div class="alts-grid">
        ${word.a.map((alt,i)=>`<button class="alt-btn" onclick="commitDecision('alternatief','${h(alt).replace(/'/g,"&#39;")}')">${h(alt)}</button>`).join('')}
      </div>
    </div>` : '';

  const eigenHtml = state.eigenMode ? `
    <div class="eigen-section">
      <div class="alts-label">Eigen vertaling</div>
      <div class="eigen-row">
        <input class="eigen-input" id="eigenInput" placeholder="Typ de vertaling..." onkeydown="if(event.key==='Enter')confirmEigen()">
        <button class="eigen-confirm" onclick="confirmEigen()">✓</button>
      </div>
    </div>` : '';

  const actionsHtml = state.eigenMode ? `
    <button class="btn-cancel" onclick="cancelEigen()">← Annuleren</button>` : `
    <button class="btn-primair" style="background:linear-gradient(135deg,${c}2a,${c}12);color:${c};border-color:${c}50" onclick="commitDecision('primair','${h(word.p).replace(/'/g,"&#39;")}')">
      ✓ Primair klopt — ${h(word.p)}
    </button>
    <div class="btn-row">
      <button class="btn-eigen" onclick="startEigen()">✏️ Eigen</button>
      <button class="btn-later" onclick="commitDecision('open','')">Later →</button>
    </div>`;

  document.getElementById('app').innerHTML = `
  <div class="screen" style="display:flex;flex-direction:column">
    <div class="review-topbar">
      <div class="review-topbar-row">
        <button class="review-back" onclick="goHome()">← ${h(niveau)}</button>
        <div class="review-meta">
          <span id="flashMsg" class="review-flash" style="display:none">✓</span>
          ${openCount>0?`<span class="review-open-badge">${openCount} open</span>`:''}
          <span class="review-counter">${decidedCount}/${words.length}</span>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" style="width:${pct}%;background:${c}"></div>
      </div>
    </div>
    <div class="review-body" id="reviewBody">
      <div class="word-card" style="border-color:${tc}1a">
        <div class="thema-tag" style="background:${tc}1a;color:${tc}">${h(word.t)}</div>
        <div class="word-label">Nederlands</div>
        <div class="word-nl">${h(word.n)}</div>
        <div class="word-label">Berbers · primair</div>
        <div class="word-primary" style="color:${c}">${h(word.p)}</div>
      </div>
      ${altsHtml}
      ${eigenHtml}
    </div>
    <div class="review-actions">${actionsHtml}</div>
  </div>`;

  if (state.eigenMode) {
    setTimeout(()=>{ const el=document.getElementById('eigenInput'); if(el)el.focus(); },60);
  }
}

// ── Review Actions ─────────────────────────────────────────────────────────
function commitDecision(status, waarde) {
  const niveau = state.activeNiveau;
  const ns = state.allDecisions[niveau];
  const idx = ns?.idx||0;
  const words = DATA[niveau].w;
  const word = words[idx];
  const newDecisions = {...(ns?.decisions||{}), [idx]: {status, waarde}};
  state.allDecisions[niveau] = {decisions: newDecisions, idx: Math.min(idx+1, words.length)};
  lsSave(niveau);
  state.eigenMode = false;

  if (state.participant) {
    const payload = {
      participant_id: state.participant.id,
      session_id: state.participant.session_id,
      niveau,
      word_idx: idx,
      nederlands: word.n,
      primair: word.p,
      thema: word.t,
      status,
      waarde: waarde || null,
    };
    pushResponse(payload).then(persistQueue);
  }

  renderReview();
}
function startEigen() { state.eigenMode=true; renderReview(); }
function cancelEigen() { state.eigenMode=false; renderReview(); }
function confirmEigen() {
  const val = document.getElementById('eigenInput')?.value?.trim();
  if (val) commitDecision('eigen', val);
}

// ── Render Results ─────────────────────────────────────────────────────────
function renderResults() {
  const niveau = state.activeNiveau;
  const words = DATA[niveau].w;
  const ns = state.allDecisions[niveau];
  const decisions = ns?.decisions||{};
  const c = NC[NIVEAUS.indexOf(niveau)];
  const sc = {primair:'#4ade80',alternatief:'#60a5fa',eigen:'#f59e0b',open:'#64748b'};
  const sl = {primair:'Primair ✓',alternatief:'Alt.',eigen:'Eigen ✏️',open:'Open'};

  const reviewed = words.map((w,i)=>({w,i,d:decisions[i]})).filter(x=>x.d);
  const counts = {};
  reviewed.forEach(x=>{ counts[x.d.status]=(counts[x.d.status]||0)+1; });
  const byStatus = state.filter==='alle' ? reviewed : reviewed.filter(x=>x.d.status===state.filter);
  const search = (state.resultSearch || '').trim().toLowerCase();
  const filtered = search
    ? byStatus.filter(x => {
        const nl = (x.w.n || '').toLowerCase();
        const pr = (x.w.p || '').toLowerCase();
        const wa = (x.d.waarde || '').toLowerCase();
        const th = (x.w.t || '').toLowerCase();
        return nl.includes(search) || pr.includes(search) || wa.includes(search) || th.includes(search);
      })
    : byStatus;

  const filterBtns = [['alle',reviewed.length],['primair',counts.primair||0],['alternatief',counts.alternatief||0],['eigen',counts.eigen||0],['open',counts.open||0]].map(([f,n])=>{
    const active = state.filter===f;
    const fc = sc[f]||c;
    return `<button class="filter-btn" style="background:${active?fc+'20':'#111118'};color:${active?fc:'#666'};border-color:${active?fc:'#ffffff15'}" onclick="setFilter('${f}')">${f==='alle'?'Alle':f.charAt(0).toUpperCase()+f.slice(1)} (${n})</button>`;
  }).join('');

  const emptyMsg = reviewed.length === 0
    ? 'Nog geen woorden beoordeeld in dit niveau.'
    : search
      ? `Geen resultaten voor "${h(state.resultSearch)}"`
      : 'Nog niets in deze categorie';

  const items = filtered.length===0
    ? `<div class="empty-state">${emptyMsg}</div>`
    : filtered.map(({w,i,d})=>`
    <button class="result-item" style="border-left-color:${sc[d.status]||'#fff'}" onclick="openEdit(${i})">
      <div style="flex:1;min-width:0">
        <div class="result-nl">${h(w.n)}</div>
        <div class="result-berbers" style="color:${sc[d.status]}">${h(d.waarde||w.p)}</div>
        ${d.status!=='primair'?`<div class="result-orig">primair: ${h(w.p)}</div>`:''}
        <div class="result-orig" style="color:#555;font-size:10px;margin-top:2px">${h(w.t||'')}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:10px;flex-shrink:0">
        <span class="result-status" style="color:${sc[d.status]}">${sl[d.status]}</span>
        <span class="result-edit-icon">✎</span>
      </div>
    </button>`).join('');

  document.getElementById('app').innerHTML = `
  <div class="screen">
    <div class="results-header">
      <button class="review-back" style="padding:0 0 10px" onclick="goHome()">← Terug</button>
      <div class="results-toprow">
        <div>
          <div class="results-title-sub">${h(niveau)}</div>
          <div class="results-title">Resultaten</div>
        </div>
        <button class="btn-csv" style="background:${c}20;color:${c};border-color:${c}50" onclick="doExport('${h(niveau)}')">⬇ CSV</button>
      </div>
      <div class="results-search-row">
        <input id="resultSearch" class="results-search" placeholder="🔍 Zoek in Nederlands, thema of vertaling..." value="${h(state.resultSearch||'')}" oninput="setResultSearch(this.value)">
        ${state.resultSearch?`<button class="results-search-clear" onclick="setResultSearch('')">✕</button>`:''}
      </div>
      <div class="filter-row">${filterBtns}</div>
      ${search && filtered.length>0 ? `<div class="results-search-meta">${filtered.length} resultaat${filtered.length===1?'':'en'} voor "${h(state.resultSearch)}"</div>`:''}
    </div>
    <div class="results-list">${items}</div>
  </div>`;
  // focus behouden bij live-zoeken
  if (search) {
    setTimeout(()=>{
      const el = document.getElementById('resultSearch');
      if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
    }, 0);
  }
}

function setFilter(f) { state.filter=f; renderResults(); }
function setResultSearch(v) { state.resultSearch = v; renderResults(); }

// ── Edit Modal ─────────────────────────────────────────────────────────────
function openEdit(wordIdx) {
  state.editingWordIdx = wordIdx;
  const niveau = state.activeNiveau;
  const word = DATA[niveau].w[wordIdx];
  const decisions = state.allDecisions[niveau]?.decisions||{};
  const cur = decisions[wordIdx];
  const c = NC[NIVEAUS.indexOf(niveau)];
  const tc = TC[word.t]||'#64748b';
  const sc = {primair:'#4ade80',alternatief:'#60a5fa',eigen:'#f59e0b'};

  const isSelected = (status,waarde) => cur?.status===status&&(!waarde||cur?.waarde===waarde);
  const mOpt = (status,waarde,label,subLabel) => {
    const sel = isSelected(status,waarde);
    const bc = sc[status]||c;
    return `<button class="modal-option" style="background:${sel?bc+'25':'#0d0d14'};color:${sel?bc:'#bbb'};border-color:${sel?bc:'#ffffff18'}" onclick="saveEdit('${status}','${h(waarde||'').replace(/'/g,"&#39;")}')">
      <span>${h(label)}</span><span class="modal-option-label">${h(subLabel)}${sel?' ✓':''}</span>
    </button>`;
  };

  const altsHtml = word.a.length>0 ? `
    <div class="modal-alts">
      ${word.a.map(alt=>{
        const sel=isSelected('alternatief',alt);
        return `<button class="modal-alt" style="background:${sel?'#60a5fa25':'#0d0d14'};color:${sel?'#60a5fa':'#bbb'};border-color:${sel?'#60a5fa':'#ffffff18'}" onclick="saveEdit('alternatief','${h(alt).replace(/'/g,"&#39;")}')">${h(alt)}${sel?' ✓':''}</button>`;
      }).join('')}
    </div>` : '';

  const eigenVal = cur?.status==='eigen'?cur.waarde:'';
  const eigenHtml = `
    <div style="margin-bottom:8px">
      <div id="eigenToggle">
        <button class="modal-option" style="background:${cur?.status==='eigen'?'#f59e0b20':'#0d0d14'};color:${cur?.status==='eigen'?'#f59e0b':'#888'};border-color:${cur?.status==='eigen'?'#f59e0b':'#ffffff18'}" onclick="toggleModalEigen()">
          <span>✏️ ${cur?.status==='eigen'?'Eigen: '+h(cur.waarde):'Eigen vertaling'}</span>
          <span class="modal-option-label">${cur?.status==='eigen'?' ✓':''}</span>
        </button>
      </div>
      <div id="eigenInputRow" style="display:none;gap:8px">
        <input id="modalEigenInput" class="eigen-input" value="${h(eigenVal)}" placeholder="Typ de vertaling..." onkeydown="if(event.key==='Enter')confirmModalEigen()">
        <button class="eigen-confirm" onclick="confirmModalEigen()">✓</button>
      </div>
    </div>`;

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'editModal';
  modal.onclick = (e)=>{ if(e.target===modal)closeModal(); };
  modal.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div>
          <div class="modal-thema" style="background:${tc}18;color:${tc}">${h(word.t)}</div>
          <div class="modal-word">${h(word.n)}</div>
          <div class="modal-primair-orig">primair: ${h(word.p)}</div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-section-label">Kies de juiste vertaling</div>
      ${mOpt('primair',word.p,word.p,'primair')}
      ${altsHtml}
      ${eigenHtml}
      <button class="modal-back-btn" onclick="saveEdit(null,null)">↩ Terug in de lijst</button>
    </div>`;
  document.body.appendChild(modal);
}

function toggleModalEigen() {
  const toggle = document.getElementById('eigenToggle');
  const row = document.getElementById('eigenInputRow');
  if(row.style.display==='none'){
    row.style.display='flex';
    toggle.style.display='none';
    setTimeout(()=>document.getElementById('modalEigenInput')?.focus(),60);
  } else {
    row.style.display='none';
    toggle.style.display='block';
  }
}
function confirmModalEigen() {
  const val = document.getElementById('modalEigenInput')?.value?.trim();
  if(val) saveEdit('eigen',val);
}
function closeModal() {
  const m = document.getElementById('editModal');
  if(m) m.remove();
}
function saveEdit(status, waarde) {
  closeModal();
  const niveau = state.activeNiveau;
  const idx = state.editingWordIdx;
  const ns = state.allDecisions[niveau];
  const newDecisions = {...(ns?.decisions||{})};
  let newIdx = ns?.idx ?? 0;
  if (status === null) {
    // "Terug in de lijst" — lokaal verwijderen, in DB markeren als 'open' met
    // is_edit=true zodat de admin ziet dat de deelnemer z'n keuze introk.
    // Ook de review-pointer terugzetten naar (op z'n hoogst) dit woord, zodat
    // bij "Doorgaan" vanaf home dit woord meteen weer in beeld komt.
    delete newDecisions[idx];
    newIdx = Math.min(newIdx, idx);
    toast('Terug in de lijst — verschijnt weer bij "Doorgaan"');
  } else {
    newDecisions[idx] = {status, waarde};
  }
  state.allDecisions[niveau] = {...ns, decisions: newDecisions, idx: newIdx};
  lsSave(niveau);
  if (state.participant) {
    const word = DATA[niveau].w[idx];
    pushResponse({
      participant_id: state.participant.id,
      session_id: state.participant.session_id,
      niveau,
      word_idx: idx,
      nederlands: word.n,
      primair: word.p,
      thema: word.t,
      status: status || 'open',
      waarde: status ? (waarde || null) : null,
      is_edit: true,
    }).then(persistQueue);
  }
  renderResults();
}

// ── Main render dispatcher ─────────────────────────────────────────────────
function render() {
  if(state.screen==='onboard') renderOnboard();
  else if(state.screen==='home') renderHome();
  else if(state.screen==='review') renderReview();
  else if(state.screen==='results') renderResults();
  else if(state.screen==='finish') renderFinish();
}

// ── Init ───────────────────────────────────────────────────────────────────
lsLoad();
loadParticipant();
loadQueue();
if (!state.participant) state.screen='onboard';
else state.screen='home';
render();
updateSyncBadge(); // toont evt. config-banner meteen

// Asynchroon wachten tot supabase-js (van CDN) geladen is, dan init afronden:
// registreer (of her-registreer) de deelnemer en flush de wachtrij.
initSupabaseWithRetry().then(() => {
  updateSyncBadge();
  if (!sb) return;
  const job = state.participant
    ? ensureParticipantRegistered().then(() => flushQueue())
    : (state.pendingQueue.length ? flushQueue() : Promise.resolve());
  job.catch(err => recordError(err, 'initEnsure'));
});

setInterval(()=>{ if (sb) flushQueue(); else tryInitSupabase(); updateSyncBadge(); }, 15000);
window.addEventListener('online', ()=>{ if (sb) flushQueue(); else initSupabaseWithRetry().then(updateSyncBadge); });
</script>
</body>
</html>
